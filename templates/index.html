<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscaminas Distribuido Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body class="container mt-4 text-center">
    <h2 class="mb-4">Buscaminas Paralelo y Distribuido</h2>
    
    <div class="row g-3 justify-content-center align-items-center mb-3">
        <div class="col-auto text-start">
            <label for="filas" class="form-label mb-0 fw-bold">Filas:</label>
            <input type="number" id="filas" class="form-control" value="10" min="5" max="20">
        </div>
        <div class="col-auto text-start">
            <label for="columnas" class="form-label mb-0 fw-bold">Columnas:</label>
            <input type="number" id="columnas" class="form-control" value="10" min="5" max="20">
        </div>
        <div class="col-auto text-start">
            <label for="minas" class="form-label mb-0 fw-bold">Minas:</label>
            <input type="number" id="minas" class="form-control" value="12" min="1">
        </div>
        <div class="col-auto pt-4">
            <div class="form-check form-switch text-start">
                <input class="form-check-input" type="checkbox" id="modo-tiempo">
                <label class="form-check-input-label fw-bold text-danger" for="modo-tiempo">⏰ Contrarreloj (5:00 min)</label>
            </div>
        </div>
    </div>

    <div class="row g-3 justify-content-center align-items-center mb-4">
        <div class="col-auto">
            <button onclick="iniciarJuego()" class="btn btn-primary fw-bold px-4">Iniciar Juego</button>
        </div>
        <div class="col-auto">
            <button id="btn-resolver" onclick="resolverJuego()" class="btn btn-warning fw-bold" disabled>RESOLVER</button>
        </div>
    </div>

    <div class="row justify-content-center mb-3">
        <div class="col-md-6 d-flex justify-content-around panel-info">
            <div>🚩 Minas restantes: <span id="txt-minas-restantes">0</span></div>
            <div id="display-tiempo" style="display: none;">⏳ Tiempo: <span id="txt-tiempo">300</span>s</div>
        </div>
    </div>

    <div class="text-center">
        <div id="contenedor-tablero"></div>
    </div>

    <script src="{{ url_for('static', filename='js/juego.js') }}"></script>
</body>
</html>
